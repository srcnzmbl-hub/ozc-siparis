const INTERP={
 Sun:`Özünde saf, yalın bir ateş taşıyorsun. Koç Güneşi seni doğuştan bir öncü yapar: ilk adımı atan, cesaret eden, beklemekten sıkılan, önden yürüyen biri. Kimse harekete geçmezken sen geçersin; bir başlangıcın, bir kıvılcımın, bir "hadi" deme cesaretinin insanısın. İnsanlar farkında olmasa da senin bu ateşinle ısınır, senin adımınla yürümeye başlar. Enerjin liderlik etmek, yol açmak ve kendi hayatının yazarı olmak için var.

Ama bu ateşin gölgede kalan bir yüzü de var ve kaderinin asıl dersi orada saklı: sabırsızlık ve çabuk tükenme. Başladığın çoğu şeyi bitirmeden yenisine koşarsın; her boşluğu doldurmak, her tartışmayı kazanmak, her an bir şey kanıtlamak istersin. Öfken bir çakmak gibidir — hızlı parlar, hızlı söner, ama arkasında yorgunluk bırakır. Kendini durmadan sınayarak aslında en çok kendini yorarsın. İçindeki o "yeterince hızlı, yeterince güçlü, yeterince önde miyim" sorusu seni hep bir adım daha koşmaya iter.

Daha huzurlu bir ruh hâline kavuşman için öğrenmen gereken şu: her savaşı senin kazanman, her boşluğu senin doldurman, her yarışta önde olman gerekmez. Gerçek gücün başlatmakta değil, bir şeyi sonuna kadar taşıyabilmekte gizli. Enerjini dağıtmak yerine tek bir şeye kök saldığında, o yakıp yıkan ateş; ısıtan, aydınlatan, büyüten bir güce dönüşür. Beklemeyi, bitirmeyi ve zaman zaman ikinci sırada sessizce durmayı göze aldığında, kanıtlama telaşın yerini derin ve sarsılmaz bir öz güvene bırakır. O zaman anlarsın ki sen zaten yeterlisin — koşmasan da, kazanmasan da, sadece var olduğun için.`,
 Moon:`Duygusal dünyan temkinli, ölçülü ve dayanıklıdır. Oğlak Ayı sana hislerini kolayca göstermeyen, önce kendi ayakları üstünde durmak isteyen, sevgiyi sözle değil sorumlulukla ve sadakatle kanıtlayan bir yapı verir. Herkes dağıldığında sen ayakta kalırsın; kriz anında soğukkanlılığını korur, çevrendekilerin sığındığı sağlam bir liman olursun. Bu, senin en güçlü, en güvenilir yanındır.

Ama kaderinin gölgesi tam da bu güçte saklı: duygularını bastırmayı, ihtiyaç duymamayı, her şeyi tek başına taşımayı bir erdem sanmak. İçinde bir yerde, sevginin ancak hak edilerek, çalışarak, kusursuz olarak kazanılacağına inanırsın. Kırılganlığını göstermek sana zayıflık gibi gelir; yardım istemek, yaslanmak, "ben de yorgunum" demek zorlar seni. Yıllarca herkesin yükünü sırtlanır ama kendi yükünü kimseyle paylaşmazsın — ve bu, seni yavaş yavaş içten içe yalnızlığa ve sessiz bir yorgunluğa sürükler.

Daha huzurlu olman için öğrenmen gereken ders şudur: ihtiyaç duymak zayıflık değil, insan olmanın ta kendisidir. Sevgiyi hak etmek zorunda değilsin; sen zaten, hiçbir şey yapmadan, olduğun gibi sevilmeye değersin. Birine yaslanmana, "yardım et" demene, ağlamana izin verdiğinde hiçbir şey çökmez — aksine yıllardır taşıdığın o ağır yük hafifler. Kendine gösterdiğin katı disiplinin, o acımasız "daha iyi ol" sesinin bir kısmını şefkate çevirdiğinde, içindeki o sürekli "yeterince iyi miyim" sorusu nihayet susar. Ve o zaman ilk kez gerçekten dinlenebilir, sadece var olabilir ve sevginin karşılıksız da gelebileceğini deneyimleyebilirsin.`,
 Mercury:`Zihnin hızlı, keskin ve doğrudan çalışır. Koç Merkürü sana düşünür düşünmez söyleyen, lafı hiç dolandırmayan, kararlarını şimşek gibi veren bir akıl verir. Tartışmada cesursun, fikirlerinde nettsin, bir konunun özüne herkesten önce varırsın. İnsanlar senin dobralığına güvenir; çünkü ne düşünüyorsan onu söylersin, arkanda bir şey saklamazsın. Zekân bir kılıç gibi — hızlı, parlak ve doğrudan hedefe.

Ama bu keskinliğin gölgesi de var ve kaderinin dersi orada: aceleyle konuşmak, dinlemeden cevap vermek, düşünmeden tepki vermek. Sözlerin bazen niyetinden çok daha sert çıkar; karşındakini kırdığını çoğu zaman sen bile sonradan fark edersin. Sabırsızlığın seni detayları atlamaya, bir tartışmayı gereksiz yere büyütmeye, haklı çıkmak uğruna köprüler yıkmaya itebilir. Zihnin o kadar hızlı akar ki, bazen kalbinin ne hissettiğini duymadan ağzından sözler dökülür.

Daha huzurlu bir zihne kavuşman için öğrenmen gereken şey, cevap vermeden önce bir nefeslik boşluk bırakmaktır. Her düşünceni anında söylemek zorunda değilsin; bazen susmak, bir tartışmayı kazanmaktan çok daha güçlü ve olgun bir duruştur. Karşındakini gerçekten dinlediğinde — sadece cevabını hazırlamak için değil, anlamak için dinlediğinde — hem ilişkilerin yumuşar hem de o keskin zekân bir silah olmaktan çıkıp bir köprüye dönüşür. Sözlerinin gücünü fark edip onları şefkatle kullanmayı öğrendiğinde, zihnindeki o hiç durmayan koşuşturma yerini berrak, sakin ve dingin bir netliğe bırakır. En güçlü sözlerin, en yüksek sesle değil, en doğru anda ve en yumuşak kalple söylenenler olduğunu anlarsın.`,
 Venus:`Sevgi anlayışın özgürlük ister. Kova Venüsü seni sıradan, boğucu, sıkı sıkıya bağlayan ilişkilerden kaçıran; alışılmadık ama gerçek, eşit ve zihinsel bağlar arayan biri yapar. Sevdiğinde bile kendi benliğini, kendi dünyanı, kendi özgürlüğünü korursun. Senin için aşkın temeli arkadaşlıktır; yapmacıklıktan, sahiplenmeden, klişelerden hoşlanmazsın. Bir insanı gerçekten görebilen, ona sıra dışı ve içten bir sadakatle bağlanabilen bir kalbin var.

Ama kaderinin gölgeli yanı da burada: yakınlaşınca geri çekilmek. Bağlanmayı, özgürlüğünü kaybetmekle karıştırırsın. Biri sana fazla yaklaştığında, seni gerçekten sevmeye başladığında içinde bir alarm çalar ve farkında olmadan o kişiyi bir kol mesafesinde tutarsın. Duygusal mesafe sana güvenli gelir — kimse fazla yaklaşmazsa kimse seni incitemez. Ama aynı mesafe, seni sevdiklerinden de sevilmekten de yavaşça uzaklaştırır ve seni bir tür gönüllü yalnızlığa hapseder.

Daha huzurlu olman için öğrenmen gereken şey şudur: yakınlık, özgürlüğün düşmanı değildir. Birine tümüyle açılman, kalbini göstermen, "sana ihtiyacım var" demen; bağımsızlığından, benliğinden vazgeçtiğin anlamına gelmez. İçini gösterdiğinde kaybolmayacağını, aksine daha da kendin olabileceğini deneyimledikçe korkun azalır. Gerçek özgürlük, kimseye ihtiyaç duymamak değil; birine ihtiyaç duyabilecek kadar cesur olmak ve yine de kendin kalabilmektir. Bunu öğrendiğinde, hem sevginin hem özgürlüğünün aynı anda, yan yana var olabildiğini görürsün — ve ilişkilerinde, o hep aradığın ama bir türlü izin veremediğin derin, sıcak, güvenli huzuru nihayet bulursun.`,
 Mars:`Arzun ve iraden saf, dolaysız ve güçlüdür. Kendi evinde olan Koç Marsı sana istediğinde anında harekete geçen, engel gördükçe hızlanan, mücadeleden asla korkmayan bir enerji verir. İçindeki kıvılcım her an hazırdır; başlatmakta, savunmakta, yol açmakta ve imkânsız görüneni denemekte ustasın. Bir amacın olduğunda önüne çıkanı aşarsın; senin sözlüğünde "olmaz" kelimesi zor yer bulur. Bu ham, canlı enerji doğru yöne aktığında hayatının en büyük motorudur.

Ama gölgede kalan kader noktan dürtüsellik ve öfkedir. Düşünmeden davranmak, sabırsızlık, birçok şeyi ateşle başlatıp yarıda bırakmak, gereksiz çatışmalara girmek ve her engeli bir savaş gibi görmek — enerjini boşa akıtır, seni yıpratır ve bazen en sevdiklerinle aranı açar. Kızgınlığın anında parlar; o an haklı hissedersin ama sonra o hızla söylediğin, yaptığın şeylerin bedelini ödersin. İçindeki bu güç, yönetilmediğinde çevreni yakar.

Daha huzurlu olman için öğrenmen gereken ders, gücünü hedefe yöneltmektir. Ham enerjiyi kör bir tepki değil, bilinçli bir amaç hâline getirdiğinde, aynı ateş yıkıcı olmaktan çıkıp yaratıcı olur. Tepki vermeden önce bir an durmayı — sadece bir nefes — öfkeni bastırmak için değil, onu bir yakıt gibi kullanmak için öğrendiğinde çok şey değişir. O zaman hem başladığın şeyleri sonuna kadar tamamlar, hem de içindeki o sürekli gerginliğin yerini sakin ama kararlı, dingin ama güçlü bir enerjiye bıraktığını görürsün. Gerçek savaşçı, her savaşa giren değil; hangi savaşın gerçekten değdiğini bilendir.`,
 Jupiter:`Büyümen, şansın ve bolluğun sezgi, şefkat ve hayal gücü yoluyla gelir. Balık Jüpiteri sana derin bir empati, görünmeyeni hissetme yeteneği ve neredeyse mistik bir ruhani genişlik verir. İnsanların söylemediklerini duyar, acılarını içeriden anlarsın; sanata, hayale ve manevi olana doğuştan bir yakınlığın vardır. Cömertliğin ve merhametin sınırsızdır — verirken hesap yapmaz, karşılıksız sevebilirsin. Bu şefkat, senin en büyük hazinen ve dünyaya getirdiğin en değerli armağandır.

Ama gölgede kalan kader noktan sınırların bulanıklaşmasıdır. Kendini başkalarında kaybedersin; herkesi kurtarmaya, herkesin acısını sırtlanmaya çalışırken kendi kadehin boşalır. Hayal kırıklığına uğradığında gerçeklikten kaçma, kendini uyuşturma, dünyanın sertliğinden bir hayale sığınma eğilimin olabilir. İyi niyetin, sınır koyamaman yüzünden bazen seni istismara açık bırakır; hayır diyemez, kendini tüketene kadar verir, sonra da neden bu kadar yorgun olduğunu anlayamazsın.

Daha huzurlu olman için öğrenmen gereken şey, şefkatini sınırlarla dengelemektir. Herkese "evet" demek zorunda değilsin; kendine koyduğun sağlıklı sınırlar merhametini zayıflatmaz, aksine onu kalıcı ve gerçek kılar. Önce kendi kadehini doldurmadan başkalarına dolusundan veremezsin. Hayallerini yere bastığında, onu bir kaçış değil bir pusula olarak kullandığında ve kendine de en az başkalarına gösterdiğin kadar şefkat gösterdiğinde, o uçsuz bucaksız iç dünyan seni yormaz, besler. Dünyayı kurtarmak zorunda değilsin — kendi ışığınla, sınırlarını koruyarak, sürdürülebilir bir sevgiyle var olman bile başlı başına bir şifadır.`,
 Saturn:`Satürn, hayatın sana en çok ders verdiği, olgunlaşman için seni tekrar tekrar sınadığı alandır — ve senin için bu alan kendini ortaya koyma, irade, cesaret ve öncülüktür. Koç Satürnü atılganlığını disiplinle terbiye etmeni ister. Belki gençliğinde kendi gücüne güvenmekte, öne çıkmakta, "yeterince güçlü müyüm, hakkım var mı" sorusuyla zorlandın; belki bir dönem sesini duyurmakta, yerini almakta engellerle karşılaştın. Bu alan, hayatının en zorlu ama en dönüştürücü sınavlarını taşır.

Kaderinin gölgeli noktası, sabırsızlık ile disiplin arasındaki o sürekli gerilim ve kendine karşı acımasız eleştiridir. Hata yapmaktan korkarsın; başaramadığında kendini herkesten çok sen yargılarsın. İçinde sürekli "daha fazlasını yapmalıydım, daha güçlü olmalıydım" diyen sert bir ses vardır. Başkalarına gösterdiğin anlayışı bir türlü kendine göstermezsin. Ama tam da bu zorlandığın alan, zamanla en büyük ustalığını kazanacağın yerdir.

Daha huzurlu olman için öğrenmen gereken şey, gücün aceleyle değil istikrarla, sabırla, adım adım geldiğidir. Hayat sana "acele etme, süreklilik" der. Kendine gösterdiğin sertliği sabra ve şefkate çevirdiğinde; her hatayı bir yenilgi değil bir ders olarak gördüğünde; yavaş ama sağlam ilerlediğinde, bir zamanlar seni en çok zorlayan bu alan, en çok güvendiğin, en olgun, en bilge yanına dönüşür. Yavaşlık senin düşmanın değil, ustalığının temelidir. Bir gün dönüp geriye baktığında, seni asıl büyütenin başarıların değil, o zorlandığın, düştüğün ve yeniden kalktığın anlar olduğunu anlarsın.`,
 Uranus:`Uranüs senin özgürlük, yenilik ve bireysellik damarını temsil eder; kendi evi olan Kova'da bu enerji en güçlü hâlindedir. Kuralları sorgulayan, geleceği bugünden gören, kalıplara sığmayan, kendi yolunu icat eden bir ruhun var. Herkesin gittiği yerden gitmek zorunda hissetmezsin; farklı düşünmek, farklı yaşamak, farklı olmak doğana işlemiştir. Özgünlüğün ve ileri görüşlülüğün, çoğu insanın yıllar sonra fark edeceği şeyleri sana çok önceden gösterir. Sen bir öncüsün, geleceğin habercisisin.

Bu aynı zamanda bir kuşak enerjisidir — değişime, özgürlüğe ve insanlık ideallerine olan derin bağlılığı seninle paylaşan bir neslin parçasısın.

 Neptune:`Neptün hayallerinin, sezgilerinin ve ruhani özleminin haritasıdır; Kova'daki yeri sana kolektif, ortak bir rüyaya bağlanma arzusu verir. Bir ideale, insanlığın daha iyi bir hâline, sınırların ötesindeki bir birlikteliğe inanma isteği taşırsın. Dünyayı olduğu gibi değil, olabileceği gibi görürsün; içinde daha adil, daha güzel, daha bütün bir dünyanın hayali vardır ve bu hayal seni derinden besler. Sezgilerin güçlüdür; kelimelere dökülemeyeni hisseder, görünenin ardındakini sezersin.

Bu bir kuşak yerleşimidir — büyük idealleri, ortak vizyonları ve manevi arayışı seninle paylaşan bir neslin izini taşırsın.

Gölgeli kader noktan, gerçeklik ile ideal arasındaki o mesafede yaşanan hayal kırıklığıdır. Dünyayı olduğundan daha iyi, insanları olduğundan daha saf hayal edersin; öyle olmadıklarında derin bir düş kırıklığına, bir hüzne kapılabilirsin. Bazen gerçeğin sertliğinden bir hayale, bir kaçışa sığınmak istersin. İdealin o kadar yüksektir ki hiçbir gerçeklik ona yetişemez ve bu da seni yorabilir.

Daha huzurlu olman için öğrenmen gereken şey, ideallerini küçük, somut, elle tutulur adımlara indirmektir. Mükemmeli beklerken bugünkü küçük iyiliği kaçırma. Hayalini yere bastığında, onu bir kaçış değil bir yön duygusu olarak kullandığında; ve dünyanın kusurlu olmasına rağmen yine de güzel olabileceğini kabul ettiğinde, o ruhani özlem seni gerçeklikten koparan değil, gerçekliği dönüştüren bir güce dönüşür. En büyük hayaller gökyüzünde değil, atılan küçük ama gerçek adımlarda hayat bulur.`,
 Pluto:`Plüton, en derin dönüşümlerinin, en gizli gücünün ve yeniden doğuşlarının kaynağıdır; Yay'daki yeri seni anlam, hakikat ve inanç yoluyla dönüşen biri yapar. Yüzeysel cevaplarla asla yetinmezsin; hayatın büyük sorularının, "neden buradayım, her şeyin anlamı ne" sorularının peşine düşersin. İnançların, felsefen, dünya görüşün sabit değildir — zamanla kabuk değiştirir, yıkılır ve daha derin, daha geniş bir hakikatle yeniden doğar. Her kriz seni bir üst versiyonuna taşır; sen küllerinden yeniden doğmayı bilen birisin.

Bu bir kuşak enerjisidir — köklü inanç, özgürlük ve anlam arayışını seninle paylaşan, eski dogmaları sorgulayan bir neslin parçasısın.

Gölgeli kader noktan, "tek doğru"ya fazla sıkı sarılmak ya da anlam arayışında bir saplantıya düşmektir. Bir inanca tüm benliğinle bağlanır, sonra onu kaybettiğinde derin, sarsıcı bir boşluğa düşebilirsin. Bazen kontrolü elde tutma, her şeyin bir anlamı olması gerektiği ısrarı seni yorar. Değişim doğanda var ama aynı zamanda seni en çok korkutan şey de odur.

Daha huzurlu olman için öğrenmen gereken şey, hakikatin sabit bir nokta değil, seninle birlikte büyüyen bir yolculuk olduğudur. İnançlarının değişebileceğini kabul ettiğinde; her yıkımın aslında bir yeniden doğuş, her kaybın bir alan açma olduğunu gördüğünde, dönüşüm senin için korkulacak bir şey olmaktan çıkar. O zaman kontrolü bırakıp akışa güvenmeyi öğrenirsin — ve en büyük gücünün, hiçbir şeye tutunmadan her defasında yeniden doğabilme cesaretinde olduğunu anlarsın.`

const _pw=new THREE.Quaternion(),_pwi=new THREE.Quaternion(),_qd=new THREE.Quaternion(),_ax=new THREE.Vector3();
function makePose(defs){const out={};
for(const bn in defs){const bb=bones[bn];if(!bb||!BIND[bn]){continue;}let q=BIND[bn].clone();
for(const [axis,ang] of defs[bn]){bb.quaternion.copy(q);being.updateMatrixWorld(true);
bb.parent.getWorldQuaternion(_pw);_pwi.copy(_pw).invert();
_ax.set(axis==='x'?1:0,axis==='y'?1:0,axis==='z'?1:0);_qd.setFromAxisAngle(_ax,ang);
q=_pwi.clone().multiply(_qd).multiply(_pw).multiply(q);}
out[bn]=q.clone();bb.quaternion.copy(BIND[bn]);}
being.updateMatrixWorld(true);return out;}
function computePoses(){
for(const k of ARMB)if(bones[k])BIND[k]=bones[k].quaternion.clone();
being.updateMatrixWorld(true);

LeftArm:[['x',-0.70],['z',0.25]], LeftForeArm:[['x',-0.60]] }));

RightArm:[['z',-0.70]], RightForeArm:[],

}

n.halves[0].position.set(-cr*n.sz*0.35, d, 0); n.halves[0].rotation.z=-cr*0.7;
n.halves[1].position.set( cr*n.sz*0.35,-d, 0); n.halves[1].rotation.z= cr*0.7;}
n.core.material.opacity=Math.min(1,cr*1.3); n.core.scale.setScalar(n.sz*2.4*(1+cr*2.4));
// 3) yildiz tozu ekrani DIKDORTGEN seklinde sarar
if(cr>0.02&&!crackSpawned){crackSpawned=true; spawnRectBurst(n.pg.position.x,n.pg.position.y);}
if(crackSpawned){const bo=clamp01((ph-0.24)/0.16)*(1-clamp01((ph-0.84)/0.16));
for(const sp of bstars){sp.position.lerp(sp.userData.tgt,0.24); sp.material.opacity=bo*(0.6+0.4*Math.sin(t*3.2+sp.userData.ph));}}
// 4) yorum kartina donus
if(ph>0.72&&!cardShown){cardShown=true; openCard(n.key);}
if(ph>0.66&&n.planet){const po=1-clamp01((ph-0.66)/0.3); n.planet.traverse(o=>{if(o.material){o.material.transparent=true; o.material.opacity=po;}});}
}
}
function enterInteractive(){story.free=true;controls.enabled=true;controls.enableRotate=true;controls.enableZoom=true;controls.enablePan=false;controls.autoRotate=false;controls.minDistance=3.5;controls.maxDistance=60;controls.target.copy(CIRCLE_C);camera.position.copy(CAM_D);camera.fov=FOV_D;camera.updateProjectionMatrix();controls.update();}
// dokunma: surukleme (dondur) ile tik (sec) ayirt et
let pdx=0,pdy=0,pdMoved=false;
canvas.addEventListener('pointerdown',e=>{pdx=e.clientX;pdy=e.clientY;pdMoved=false;});
canvas.addEventListener('pointermove',e=>{if(Math.abs(e.clientX-pdx)+Math.abs(e.clientY-pdy)>7)pdMoved=true;});
canvas.addEventListener('pointerup',e=>{if(pdMoved||story.phase!=='interactive'||selected)return; pickPlanet(e.clientX,e.clientY);});

// ---- Sahne durumu ----
let story={on:false,t0:0,free:false,phase:'idle'};
function startStory(){if(story.on)return;story.on=true;story.t0=t;story.phase='cinematic';
wheel.visible=false; setPlanetsReveal(0); centerSun.visible=false; bh.visible=true;
fadeOver.style.transition='none'; fadeOver.style.opacity='1';
controls.enabled=false;controls.autoRotate=false;controls.enablePan=false;controls.minDistance=4;controls.maxDistance=48;
const bw=document.getElementById('btnWrap');bw.style.transition='opacity .5s';bw.style.opacity='0';setTimeout(()=>bw.style.display='none',520);}

function updateStory(st){
if(!story.free) driveCam(st); // animasyon bitince kamerayi SURME (kullanici serbest doner/zoom yapar)
disk.rotation.z+=0.02;
for(const p of diskP){p.userData.ang+=0.01*p.userData.sp;const r=p.userData.rad;p.position.set(Math.cos(p.userData.ang)*r,Math.sin(p.userData.ang)*r,0);}
for(const p of vortex){p.userData.ang+=0.03*p.userData.sp;p.userData.rad-=0.03*p.userData.in;if(p.userData.rad<0.5){p.userData.rad=4+Math.random()*4;p.userData.z=(Math.random()-.5)*4;}
const r=p.userData.rad;p.position.set(Math.cos(p.userData.ang)*r,Math.sin(p.userData.ang)*r,p.userData.z*(r/8));p.material.opacity=clamp01(r/6)*0.6;}

// ===== SAHNE 1: karanlik -> yildizlar -> altin top -> KARA DELIK =====
fadeOver.style.opacity=String(clamp01(1-st/1.3));
const gb=ez(clamp01((st-1.8)/1.0));
goldBall.material.opacity=gb*(1-clamp01((st-3.0)/0.9));
const gbS=0.6+gb*1.7; goldBall.scale.set(gbS,gbS,1);
const bhF=ez(clamp01((st-2.8)/1.2));
bhCore.scale.setScalar(Math.max(0.02,0.05+bhF*1.0));
diskP.forEach(p=>p.material.opacity=0.75*clamp01((st-2.8)/1.0));
if(st>2.6&&st<4.0){flash.material.opacity=Math.sin(clamp01((st-2.9)/1.0)*Math.PI)*0.9;flash.scale.setScalar(1+(st-2.9)*8);}
else flash.material.opacity=Math.max(0,flash.material.opacity-0.05);

// ===== SAHNE 2: avatar kara delikten ORIJINAL (bind) pozunda dogar =====
if(st>3.6){
const f=clamp01(1-(st-3.9)/1.2);bhCore.scale.setScalar(Math.max(0.001,(0.05+bhF*1.0)*f));
diskP.forEach(p=>p.material.opacity*=f); if(st>4.8)bh.visible=false;
being.visible=true;const k=ez(clamp01((st-3.8)/2.0));
being.scale.setScalar(Math.max(0.001,k));
being.position.set(0,-0.4-(1-k)*3.0,0);
} else { being.visible=false; }

// ===== SAHNE 5/6/7: kollar (bind -> gogus -> acilis) =====
updateArms(st);

// ===== SAHNE 3: buyulu sozler =====
const sp3=clamp01((st-5.6)/2.0);
spellG.visible = st>5.5 && st<9.6;
if(spellG.visible){
spellG.rotation.y += 0.006;
const conv=clamp01((st-7.6)/1.6);
for(let i=0;i<glyphs.length;i++){const g=glyphs[i];const app=clamp01(sp3*glyphs.length-i);
const r=SPELL_R*(1-0.7*conv);const aa=g.userData.a;
g.position.set(Math.cos(aa)*r, SPELL_Y+Math.sin(aa*2)*0.25, SPELL_Z+Math.sin(aa)*r*0.55);
g.material.opacity=app*(0.55+0.45*Math.sin(st*3+i))*(1-conv);
const sc=0.75*(0.6+0.4*app); g.scale.set(sc,sc,1);}
}

// ===== SAHNE 4: gogus onunde GUNES var olur =====
const sIgnite=ez(clamp01((st-7.5)/1.4));
frontSunG.visible = sIgnite>0.001;

// ===== SAHNE 5-8: eksenler + gezegenler + 3B harita =====
const rise8=ez(clamp01((st-14.6)/2.4));
const cc=CHART_C.clone().lerp(CHART_UP,rise8);
const baseScale=CHART_S_SMALL+(CHART_S_BIG-CHART_S_SMALL)*rise8;
frontSunG.position.copy( sIgnite>0? cc : SUN_C );
const sunScale=sIgnite*(1+0.5*rise8); frontSunG.scale.setScalar(Math.max(0.001,sunScale));
const wheelIn=ez(clamp01((st-9.4)/1.8));
if(st>9.4){
wheel.visible=true; wheel.position.copy(cc);
wheel.scale.setScalar(Math.max(0.001,baseScale*wheelIn));
wheel.rotation.x=-0.42; wheel.rotation.z=0; wheel.rotation.y+=0.004;
setPlanetsReveal(clamp01((st-9.9)/2.8));
} else { wheel.visible=false; }

// ===== SAHNE 9: cember/dereceler/gunes dusup YILDIZ TOZUNA donusur; gezegenler kalir =====
if(st>17.4){
if(!reparented){reparentPlanets();initStardust();}
const s9=ez(clamp01((st-17.5)/2.8));
wheel.position.y=CHART_UP.y-s9*6.0;
wheel.traverse(o=>{if(o===planetsG)return; if(o.material&&o.material.transparent){if(o.userData.__o0===undefined)o.userData.__o0=o.material.opacity; o.material.opacity=o.userData.__o0*(1-s9);}});
frontSunG.scale.setScalar(Math.max(0.0001,1.5*(1-s9)));
const fade=1-clamp01((st-24)/3);
for(const sp of sdust){sp.position.y+=sp.userData.vy; sp.position.x+=Math.sin(t*sp.userData.sp+sp.userData.ph)*0.004; sp.material.opacity=s9*(0.45+0.4*Math.abs(Math.sin(t*sp.userData.sp+sp.userData.ph)))*fade;}
}
// ===== SAHNE 10: gezegenler avatar onunde SAAT cemberine dizilir; burc logolari altin LED yanip soner =====
if(st>20.4 && st<23.8 && reparented){
const s10=ez(clamp01((st-20.6)/3.0));
for(const n of nodes){ if(!n.ctarget)continue;
n.pg.position.lerpVectors(n.p0,n.ctarget,s10);
n.pg.scale.setScalar(n.s0+(1.25-n.s0)*s10);
if(n.signSprite){n.signSprite.material.color.setHex(0xffe08a); n.signSprite.material.opacity=0.5+0.4*Math.sin(t*4+n.lon);}
}
}
// ===== SAHNE 11: dokunma ile gezegen merkeze gelir, kabuk yarilir, yorum paneli acilir =====
if(st>=23.8 && story.phase!=='interactive'){story.phase='interactive';enterInteractive();}
if(story.phase==='interactive'){updateInteractive();}
}
window.__dbg=()=>({st:+(t-story.t0).toFixed(2),on:story.on,ws:+wheel.scale.x.toFixed(3),wv:wheel.visible,av:being.visible,avs:+being.scale.x.toFixed(2)});
window.__seek=(s)=>{if(!story.on){story.on=true;const bw=document.getElementById('btnWrap');if(bw)bw.style.display='none';controls.autoRotate=false;controls.enabled=false;bh.visible=true;fadeOver&&(fadeOver.style.transition='none');}story.free=false;story.t0=t-s;updateStory(s);};
window.__cam=camera;window.__ctl=controls;window.__wheel=wheel;window.__being=being;window.__spell=spellG;window.__frontSun=frontSunG;
window.__story=story;window.__nodes=nodes;window.__selectKey=(k)=>{const n=nodes.find(z=>z.key===k);if(n)selectPlanet(n);};window.__pick=pickPlanet;
window.__pickDbg=(cx,cy)=>{const rect=renderer.domElement.getBoundingClientRect();ptr.x=((cx-rect.left)/rect.width)*2-1;ptr.y=-((cy-rect.top)/rect.height)*2+1;raycaster.setFromCamera(ptr,camera);const hits=raycaster.intersectObjects(raycastTargets,false);return {n:hits.length,k:hits[0]&&hits[0].object.userData.k,rw:rect.width,rh:rect.height,tgt:raycastTargets.length};};
// Kullanici HER AN mouse/parmak ile mudahale edince kamera kontrolu aninda ona gecer (3B dondur + zoom)
function freeCam(){if(story.free)return;story.free=true;controls.enabled=true;controls.enableRotate=true;controls.enableZoom=true;controls.enablePan=false;controls.autoRotate=false;controls.minDistance=3.5;controls.maxDistance=60;controls.update();}
canvas.addEventListener('pointerdown',()=>{if(story.on)freeCam();});
canvas.addEventListener('wheel',()=>{if(story.on)freeCam();},{passive:true});
canvas.addEventListener('touchstart',()=>{if(story.on)freeCam();},{passive:true});
window.__free=freeCam;
// ==============================================================

const composer=new EffectComposer(renderer);
composer.addPass(new RenderPass(scene,camera));
composer.addPass(new UnrealBloomPass(new THREE.Vector2(innerWidth,innerHeight),0.34,0.7,0.68));
composer.addPass(new OutputPass());

document.getElementById('yorumla').addEventListener('click',()=>{startStory();});

addEventListener('resize',()=>{camera.aspect=innerWidth/innerHeight;camera.updateProjectionMatrix();renderer.setSize(innerWidth,innerHeight);composer.setSize(innerWidth,innerHeight);});
document.getElementById('loading').style.display='none';
let t=0;
function loop(){requestAnimationFrame(loop);t+=Math.min(clock.getDelta(),0.1);controls.update();
for(const s of tw){const v=0.35+0.65*Math.pow((Math.sin(t*s.userData.sp+s.userData.ph)+1)/2,2);s.material.opacity=v;const sc=s.userData.b*(0.7+0.5*v);s.scale.set(sc,sc,1);}
dustGroup.rotation.y+=0.0007;dustGroup.rotation.x+=0.0003;
for(const s of dust){const v=(Math.sin(t*s.userData.sp+s.userData.ph)+1)/2;s.material.opacity=0.18+v*0.5;const sc=s.userData.base*(0.75+0.4*v);s.scale.set(sc,sc,1);}
const pulse=(Math.sin(t*2.4)+1)/2;
nodes.forEach(n=>{if(!n.isSun)n.planet.rotation.y+=0.005;if(n.isHot&&n.halo){n.halo.material.opacity=.24+pulse*.35;}});
for(const sg of suns)updateSun(sg);
if(story.on)updateStory(t-story.t0);
composer.render();}
loop();
</script>
</body>
