<!doctype html>
<html lang="tr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>Ozark Collective · 3B Natal Harita (Demo)</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{width:100%;height:100%;overflow:hidden;background:#05040d;font-family:'Georgia',serif;color:#eadfc6}
  #c{display:block;width:100%;height:100%;touch-action:none}
  .ui{position:fixed;left:0;right:0;pointer-events:none;z-index:5}
  #top{top:18px;text-align:center}
  #top .name{font-size:26px;letter-spacing:6px;color:#e9d29a;text-shadow:0 0 18px rgba(217,178,95,.5)}
  #top .sub{font-size:12px;letter-spacing:3px;color:#9a90b5;margin-top:4px}
  #hint{bottom:20px;text-align:center;font-size:12.5px;letter-spacing:1.5px;color:#8f86ad}
  #hint b{color:#d9b25f}
  #card{position:fixed;left:50%;bottom:64px;transform:translateX(-50%) translateY(30px);
        width:min(520px,88vw);background:linear-gradient(180deg,rgba(23,20,45,.94),rgba(12,10,26,.96));
        border:1px solid rgba(201,162,78,.45);border-radius:16px;padding:20px 22px;
        box-shadow:0 10px 50px rgba(0,0,0,.6),0 0 40px rgba(120,90,200,.15);
        opacity:0;pointer-events:none;transition:opacity .35s, transform .35s;z-index:8}
  #card.show{opacity:1;transform:translateX(-50%) translateY(0)}
  #card .glyph{font-size:34px;color:#e9d29a;line-height:1}
  #card h3{font-size:20px;color:#f0e6cd;letter-spacing:1px;margin:6px 0 2px}
  #card .pos{font-size:12.5px;letter-spacing:2px;color:#b79ce0;text-transform:uppercase;margin-bottom:10px}
  #card p{font-size:15px;line-height:1.6;color:#d8cdb4;font-style:italic}
  #card .x{position:absolute;top:12px;right:16px;font-family:Georgia;font-size:20px;color:#8f86ad;cursor:pointer;pointer-events:auto}
  #loading{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:#05040d;z-index:20;color:#9a90b5;letter-spacing:3px;font-size:13px}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div class="ui" id="top"><div class="name">BUSE</div><div class="sub">NATAL HARİTA · CANLI DEMO</div></div>
<div class="ui" id="hint">Sürükle: <b>döndür</b> · İki parmak / tekerlek: <b>yakınlaş</b> · Kırmızı yanan bir <b>gezegene dokun</b></div>
<div id="card"><span class="x" onclick="document.getElementById('card').classList.remove('show')">✕</span>
  <div class="glyph" id="cg">☉</div><h3 id="ct">—</h3><div class="pos" id="cp">—</div><p id="cb">—</p></div>
<div id="loading">KOZMİK ALAN HAZIRLANIYOR…</div>

<script type="importmap">
{ "imports": {
  "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
  "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
}}
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';
import { OutputPass } from 'three/addons/postprocessing/OutputPass.js';

const NAMES={Sun:'Güneş',Moon:'Ay',Mercury:'Merkür',Venus:'Venüs',Mars:'Mars',Jupiter:'Jüpiter',Saturn:'Satürn',Uranus:'Uranüs',Neptune:'Neptün',Pluto:'Plüton'};
const GLYPH={Sun:'☉',Moon:'☽',Mercury:'☿',Venus:'♀',Mars:'♂',Jupiter:'♃',Saturn:'♄',Uranus:'♅',Neptune:'♆',Pluto:'♇'};
const P={ Sun:{lon:1.3487,sign:'Koç'}, Moon:{lon:281.782,sign:'Oğlak'}, Mercury:{lon:19.4538,sign:'Koç'}, Venus:{lon:314.999,sign:'Kova'}, Mars:{lon:13.4786,sign:'Koç'}, Jupiter:{lon:340.9262,sign:'Balık'}, Saturn:{lon:20.5548,sign:'Koç'}, Uranus:{lon:311.4814,sign:'Kova'}, Neptune:{lon:301.6574,sign:'Kova'}, Pluto:{lon:248.0293,sign:'Yay'} };
const HOUSES=[6.829,45.656,71.924,93.7799,116.2359,144.6126,186.829,225.656,251.924,273.7799,296.2359,324.6126];
const INTERP={
 Sun:'Özün ateşten. İlk adımı atan, cesaret eden, beklemeyi sevmeyen bir çekirdek — enerjin öncülük etmek için var.',
 Moon:'Duyguların temkinli ve dayanıklı. Sevgiyi sözle değil; sorumlulukla ve “yanındayım” diyen istikrarla gösterirsin.',
 Mercury:'Zihnin hızlı ve doğrudan. Düşünür düşünmez söylersin; keskin, açık, dolambaçsız bir dil.',
 Venus:'Sevgin özgürlük ister. Sıradanlıktan kaçar, alışılmadık ama gerçek bağları arar; kalabalıkta bile kendine sadık kalırsın.',
 Mars:'Arzun saf ve dolaysız. İstediğinde harekete geçer, engeli görünce hızlanırsın — içindeki kıvılcım hep hazır.',
 Jupiter:'Büyümen sezgiyle gelir. Şefkat ve hayal gücü, görünmeyeni hissetme yeteneğin şansını içeriden besler.',
 Saturn:'Olgunluğun sabırsızlıkla sınanır. Zaman sana “acele değil, süreklilik” der; disiplini eylemle örersin.',
 Uranus:'Değişim senin doğal havan. Kuralları sorgular, geleceği bugünden görür, kendi yolunu icat edersin.',
 Neptune:'Hayallerin geniş ve ortak. Bir ideale, kolektif bir rüyaya bağlanma arzusu taşırsın.',
 Pluto:'Dönüşümün inançla olur. Anlam arayışın seni kabuk değiştirmeye, daha büyük bir hakikate iter.'
};
function houseOf(lon){for(let i=0;i<12;i++){let a=HOUSES[i],b=HOUSES[(i+1)%12];let d=((lon-a)%360+360)%360;let s=((b-a)%360+360)%360;if(d<s)return i+1;}return 12;}
const ASP=[[0,'conj',8],[60,'sextile',5],[90,'square',6],[120,'trine',6],[180,'opp',8]];
const keys=Object.keys(P); const aspects=[]; const hot=new Set();
for(let i=0;i<keys.length;i++)for(let j=i+1;j<keys.length;j++){ let sep=Math.abs(P[keys[i]].lon-P[keys[j]].lon)%360; if(sep>180)sep=360-sep;
 for(const[ang,typ,orb]of ASP){ if(Math.abs(sep-ang)<=orb){ const hard=(typ==='square'||typ==='opp'); aspects.push({a:keys[i],b:keys[j],hard}); if(hard){hot.add(keys[i]);hot.add(keys[j]);} break; } } }

const canvas=document.getElementById('c');
const renderer=new THREE.WebGLRenderer({canvas,antialias:true,alpha:false});
renderer.setPixelRatio(Math.min(devicePixelRatio,2)); renderer.setSize(innerWidth,innerHeight);
renderer.toneMapping=THREE.ACESFilmicToneMapping; renderer.toneMappingExposure=1.15;
const scene=new THREE.Scene(); scene.fog=new THREE.FogExp2(0x05040d,0.018);
const camera=new THREE.PerspectiveCamera(52,innerWidth/innerHeight,0.1,400); camera.position.set(0,4,15);
const controls=new OrbitControls(camera,canvas);
controls.enableDamping=true; controls.dampingFactor=.06; controls.autoRotate=true; controls.autoRotateSpeed=.5;
controls.minDistance=6; controls.maxDistance=34; controls.enablePan=false;

function radialTex(inner,outer){ const s=128,cv=document.createElement('canvas');cv.width=cv.height=s;const x=cv.getContext('2d');
 const g=x.createRadialGradient(s/2,s/2,0,s/2,s/2,s/2);g.addColorStop(0,inner);g.addColorStop(1,outer); x.fillStyle=g;x.fillRect(0,0,s,s);return new THREE.CanvasTexture(cv); }
const softTex=radialTex('rgba(255,255,255,1)','rgba(255,255,255,0)');
function starfield(n,rMin,rMax,size,col){ const g=new THREE.BufferGeometry();const pos=new Float32Array(n*3);
 for(let i=0;i<n;i++){const r=rMin+Math.random()*(rMax-rMin);const u=Math.random()*2-1;const th=Math.random()*Math.PI*2;const sq=Math.sqrt(1-u*u);
  pos[i*3]=r*sq*Math.cos(th);pos[i*3+1]=r*sq*Math.sin(th);pos[i*3+2]=r*u;}
 g.setAttribute('position',new THREE.BufferAttribute(pos,3));
 return new THREE.Points(g,new THREE.PointsMaterial({size,map:softTex,color:col,transparent:true,depthWrite:false,blending:THREE.AdditiveBlending,opacity:.9})); }
scene.add(starfield(3500,30,120,.55,0xbfc8ff)); scene.add(starfield(1200,20,90,.9,0xffe9b0));
const nebCol=[['rgba(120,90,220,.5)','rgba(120,90,220,0)'],['rgba(210,150,70,.4)','rgba(210,150,70,0)'],['rgba(70,120,220,.42)','rgba(70,120,220,0)']];
for(let i=0;i<7;i++){const c=nebCol[i%3];const sp=new THREE.Sprite(new THREE.SpriteMaterial({map:radialTex(c[0],c[1]),blending:THREE.AdditiveBlending,depthWrite:false,opacity:.55}));
 sp.position.set((Math.random()-.5)*70,(Math.random()-.5)*45,-20-Math.random()*45);const s=25+Math.random()*35;sp.scale.set(s,s,1);scene.add(sp);}

const wheel=new THREE.Group(); scene.add(wheel); wheel.rotation.x=-0.5;
const R=6, GOLD=0xd9b25f, RED=0xff3b3b;
[R,R*0.62].forEach((rr,idx)=>{const ring=new THREE.Mesh(new THREE.TorusGeometry(rr,idx?0.012:0.03,16,220),new THREE.MeshBasicMaterial({color:GOLD}));wheel.add(ring);});
for(let k=0;k<12;k++){const a=THREE.MathUtils.degToRad(k*30);
 const g=new THREE.BufferGeometry().setFromPoints([new THREE.Vector3(Math.cos(a)*R*0.62,Math.sin(a)*R*0.62,0),new THREE.Vector3(Math.cos(a)*R,Math.sin(a)*R,0)]);
 wheel.add(new THREE.Line(g,new THREE.LineBasicMaterial({color:0x6b5aa6,transparent:true,opacity:.5})));}
HOUSES.forEach(h=>{const a=THREE.MathUtils.degToRad(h);
 const g=new THREE.BufferGeometry().setFromPoints([new THREE.Vector3(0,0,0),new THREE.Vector3(Math.cos(a)*R*0.62,Math.sin(a)*R*0.62,0)]);
 wheel.add(new THREE.Line(g,new THREE.LineBasicMaterial({color:0x3f3768,transparent:true,opacity:.45})));});
const core=new THREE.Sprite(new THREE.SpriteMaterial({map:radialTex('rgba(230,200,130,.8)','rgba(230,200,130,0)'),blending:THREE.AdditiveBlending,depthWrite:false}));core.scale.set(4,4,1);wheel.add(core);
function posOf(lon){const a=THREE.MathUtils.degToRad(lon);return new THREE.Vector3(Math.cos(a)*R*0.82,Math.sin(a)*R*0.82,0);}
aspects.forEach(as=>{const g=new THREE.BufferGeometry().setFromPoints([posOf(P[as.a].lon),posOf(P[as.b].lon)]);
 wheel.add(new THREE.Line(g,new THREE.LineBasicMaterial({color:as.hard?RED:GOLD,transparent:true,opacity:as.hard?.5:.35})));});
function glyphSprite(ch,color){ const s=128,cv=document.createElement('canvas');cv.width=cv.height=s;const x=cv.getContext('2d');
 x.clearRect(0,0,s,s);x.font='72px Georgia';x.textAlign='center';x.textBaseline='middle';x.shadowColor=color;x.shadowBlur=18;x.fillStyle=color;x.fillText(ch,s/2,s/2+4);
 const sp=new THREE.Sprite(new THREE.SpriteMaterial({map:new THREE.CanvasTexture(cv),transparent:true,depthWrite:false}));sp.scale.set(1.1,1.1,1);return sp; }
const nodes=[];
keys.forEach(k=>{const pos=posOf(P[k].lon);const isHot=hot.has(k);const col=isHot?RED:GOLD;
 const mesh=new THREE.Mesh(new THREE.SphereGeometry(0.16,20,20),new THREE.MeshBasicMaterial({color:col}));
 mesh.position.copy(pos);mesh.userData={k,isHot};wheel.add(mesh);
 const halo=new THREE.Sprite(new THREE.SpriteMaterial({map:radialTex(isHot?'rgba(255,80,80,.9)':'rgba(230,200,130,.9)',isHot?'rgba(255,80,80,0)':'rgba(230,200,130,0)'),blending:THREE.AdditiveBlending,depthWrite:false}));
 halo.position.copy(pos);halo.scale.set(1.1,1.1,1);wheel.add(halo);mesh.userData.halo=halo;
 const gl=glyphSprite(GLYPH[k],'#f0e6cd');gl.position.copy(posOf(P[k].lon).multiplyScalar(1.16));wheel.add(gl);
 nodes.push(mesh);});

const composer=new EffectComposer(renderer);
composer.addPass(new RenderPass(scene,camera));
composer.addPass(new UnrealBloomPass(new THREE.Vector2(innerWidth,innerHeight),0.9,0.6,0.2));
composer.addPass(new OutputPass());

const ray=new THREE.Raycaster();const m=new THREE.Vector2();let downXY=null;
function showCard(k){const s=P[k];const h=houseOf(s.lon);
 document.getElementById('cg').textContent=GLYPH[k];
 document.getElementById('ct').textContent=NAMES[k]+' · '+s.sign;
 document.getElementById('cp').textContent=h+'. EV · '+s.sign;
 document.getElementById('cb').textContent=INTERP[k];
 document.getElementById('card').classList.add('show');controls.autoRotate=false;}
canvas.addEventListener('pointerdown',e=>downXY=[e.clientX,e.clientY]);
canvas.addEventListener('pointerup',e=>{ if(!downXY)return;const dx=e.clientX-downXY[0],dy=e.clientY-downXY[1];downXY=null;
 if(Math.hypot(dx,dy)>6)return; m.x=(e.clientX/innerWidth)*2-1;m.y=-(e.clientY/innerHeight)*2+1;
 ray.setFromCamera(m,camera);const hit=ray.intersectObjects(nodes); if(hit.length)showCard(hit[0].object.userData.k); });
addEventListener('resize',()=>{camera.aspect=innerWidth/innerHeight;camera.updateProjectionMatrix();renderer.setSize(innerWidth,innerHeight);composer.setSize(innerWidth,innerHeight);});
document.getElementById('loading').style.display='none';
let t=0;
function loop(){requestAnimationFrame(loop);t+=0.016;controls.update();
 const pulse=(Math.sin(t*3)+1)/2;
 nodes.forEach(n=>{if(n.userData.isHot){n.scale.setScalar(1+pulse*0.9);n.userData.halo.scale.setScalar(1.1*(1+pulse*0.8));n.userData.halo.material.opacity=.4+pulse*.6;}});
 core.material.opacity=.7+pulse*.25; composer.render();}
loop();
</script>
</body>
</html>
