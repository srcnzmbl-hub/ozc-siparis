<!doctype html>
<html lang="tr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>Ozark Collective · 3B Natal Harita (Açılış)</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{width:100%;height:100%;overflow:hidden;background:#03020a;font-family:'Georgia',serif;color:#eadfc6}
  #c{display:block;width:100%;height:100%;touch-action:none}
  .ui{position:fixed;left:0;right:0;pointer-events:none;z-index:5}
  #top{top:20px;text-align:center}
  #top .name{font-size:26px;letter-spacing:7px;color:#e7d4a0;text-shadow:0 0 16px rgba(180,140,255,.45)}
  #top .sub{font-size:11.5px;letter-spacing:4px;color:#8a80b8;margin-top:5px}
  #btnWrap{bottom:46px;text-align:center}
  #yorumla{pointer-events:auto;cursor:pointer;display:inline-block;font-family:'Georgia',serif;font-size:16px;letter-spacing:3px;
    color:#2a1c05;padding:15px 40px;border-radius:40px;border:1px solid #f4d98a;
    background:linear-gradient(180deg,#f6e2a6,#d9b25f 55%,#b98e3e);
    box-shadow:0 0 26px rgba(230,190,110,.55),0 8px 24px rgba(0,0,0,.5),inset 0 1px 2px rgba(255,255,255,.6);
    animation:glow 2.6s ease-in-out infinite}
  @keyframes glow{0%,100%{box-shadow:0 0 20px rgba(230,190,110,.45),0 8px 24px rgba(0,0,0,.5),inset 0 1px 2px rgba(255,255,255,.6)}
    50%{box-shadow:0 0 40px rgba(245,215,140,.85),0 8px 24px rgba(0,0,0,.5),inset 0 1px 2px rgba(255,255,255,.7)}}
  #toast{position:fixed;left:50%;bottom:120px;transform:translateX(-50%) translateY(12px);opacity:0;transition:.4s;
    background:rgba(20,16,40,.92);border:1px solid rgba(170,140,255,.4);color:#d9cff2;padding:12px 20px;border-radius:12px;
    font-size:13.5px;letter-spacing:1px;z-index:9;pointer-events:none}
  #toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
  #loading{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:#03020a;z-index:20;color:#8a80b8;letter-spacing:3px;font-size:13px}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div class="ui" id="top"><div class="name">BUSE</div><div class="sub">NATAL HARİTA</div></div>
<div class="ui" id="btnWrap"><span id="yorumla">✦  HARİTAYI YORUMLA  ✦</span></div>
<div id="toast">Yorumlama sahnesi (avatar) bir sonraki adımda geliyor ✨</div>
<div id="loading">KOZMİK ALAN HAZIRLANIYOR…</div>

<script type="importmap">
{ "imports": {
  "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
  "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
}}
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';
import { OutputPass } from 'three/addons/postprocessing/OutputPass.js';

const GLYPH={Koç:'♈',Boğa:'♉',İkizler:'♊',Yengeç:'♋',Aslan:'♌',Başak:'♍',Terazi:'♎',Akrep:'♏',Yay:'♐',Oğlak:'♑',Kova:'♒',Balık:'♓'};
const P={ Sun:{lon:1.3487,sign:'Koç'}, Moon:{lon:281.782,sign:'Oğlak'}, Mercury:{lon:19.4538,sign:'Koç'}, Venus:{lon:314.999,sign:'Kova'}, Mars:{lon:13.4786,sign:'Koç'}, Jupiter:{lon:340.9262,sign:'Balık'}, Saturn:{lon:20.5548,sign:'Koç'}, Uranus:{lon:311.4814,sign:'Kova'}, Neptune:{lon:301.6574,sign:'Kova'}, Pluto:{lon:248.0293,sign:'Yay'} };
const HOUSES=[6.829,45.656,71.924,93.7799,116.2359,144.6126,186.829,225.656,251.924,273.7799,296.2359,324.6126];
const ASP=[[0,8],[60,5],[90,6],[120,6],[180,8]], HARD=new Set([90,180]);
const keys=Object.keys(P); const aspects=[]; const hot=new Set();
for(let i=0;i<keys.length;i++)for(let j=i+1;j<keys.length;j++){ let sep=Math.abs(P[keys[i]].lon-P[keys[j]].lon)%360; if(sep>180)sep=360-sep;
 for(const[ang,orb]of ASP){ if(Math.abs(sep-ang)<=orb){ const hard=HARD.has(ang); aspects.push({a:keys[i],b:keys[j],hard}); if(hard){hot.add(keys[i]);hot.add(keys[j]);} break; } } }

const canvas=document.getElementById('c');
const renderer=new THREE.WebGLRenderer({canvas,antialias:true});
renderer.setPixelRatio(Math.min(devicePixelRatio,2)); renderer.setSize(innerWidth,innerHeight);
renderer.toneMapping=THREE.ACESFilmicToneMapping; renderer.toneMappingExposure=1.0;
const scene=new THREE.Scene(); scene.fog=new THREE.FogExp2(0x03020a,0.016);
const camera=new THREE.PerspectiveCamera(52,innerWidth/innerHeight,0.1,400); camera.position.set(0,3.5,15.5);
const controls=new OrbitControls(camera,canvas);
controls.enableDamping=true; controls.dampingFactor=.06; controls.autoRotate=true; controls.autoRotateSpeed=.42;
controls.minDistance=7; controls.maxDistance=30; controls.enablePan=false;

function radialTex(inner,outer){ const s=128,cv=document.createElement('canvas');cv.width=cv.height=s;const x=cv.getContext('2d');
 const g=x.createRadialGradient(s/2,s/2,0,s/2,s/2,s/2);g.addColorStop(0,inner);g.addColorStop(1,outer); x.fillStyle=g;x.fillRect(0,0,s,s);return new THREE.CanvasTexture(cv); }
const softTex=radialTex('rgba(255,255,255,1)','rgba(255,255,255,0)');

function starfield(n,rMin,rMax,size,col,op){ const g=new THREE.BufferGeometry();const pos=new Float32Array(n*3);
 for(let i=0;i<n;i++){const r=rMin+Math.random()*(rMax-rMin);const u=Math.random()*2-1;const th=Math.random()*Math.PI*2;const sq=Math.sqrt(1-u*u);
  pos[i*3]=r*sq*Math.cos(th);pos[i*3+1]=r*sq*Math.sin(th);pos[i*3+2]=r*u;}
 g.setAttribute('position',new THREE.BufferAttribute(pos,3));
 return new THREE.Points(g,new THREE.PointsMaterial({size,map:softTex,color:col,transparent:true,depthWrite:false,blending:THREE.AdditiveBlending,opacity:op})); }
scene.add(starfield(3000,28,110,.45,0x9fb0ff,.55));
scene.add(starfield(1400,24,95,.5,0xd8a2ff,.4));

const tw=[];
for(let i=0;i<120;i++){const s=new THREE.Sprite(new THREE.SpriteMaterial({map:softTex,color:0xffffff,transparent:true,depthWrite:false,blending:THREE.AdditiveBlending}));
 const r=16+Math.random()*80,u=Math.random()*2-1,th=Math.random()*Math.PI*2,sq=Math.sqrt(1-u*u);
 s.position.set(r*sq*Math.cos(th),r*sq*Math.sin(th),r*u);
 const b=0.25+Math.random()*0.5; s.scale.set(b,b,1); s.userData={ph:Math.random()*6.28,sp:1.5+Math.random()*2.5,b};
 scene.add(s); tw.push(s);}

const nebCol=[['rgba(150,90,235,.42)','rgba(150,90,235,0)'],['rgba(70,110,225,.36)','rgba(70,110,225,0)'],['rgba(205,80,180,.34)','rgba(205,80,180,0)'],['rgba(90,190,210,.3)','rgba(90,190,210,0)']];
for(let i=0;i<9;i++){const c=nebCol[i%4];const sp=new THREE.Sprite(new THREE.SpriteMaterial({map:radialTex(c[0],c[1]),blending:THREE.AdditiveBlending,depthWrite:false,opacity:.5}));
 sp.position.set((Math.random()-.5)*90,(Math.random()-.5)*55,-25-Math.random()*55);const s=28+Math.random()*40;sp.scale.set(s,s,1);scene.add(sp);}

const wheel=new THREE.Group(); scene.add(wheel); wheel.rotation.x=-0.5;
const R=6;
[[R,0.028,0xcaa658],[R*0.62,0.014,0x9c7fd6]].forEach(([rr,tb,col])=>{wheel.add(new THREE.Mesh(new THREE.TorusGeometry(rr,tb,16,220),new THREE.MeshBasicMaterial({color:col,transparent:true,opacity:.85})));});
for(let k=0;k<12;k++){const a=THREE.MathUtils.degToRad(k*30);
 const g=new THREE.BufferGeometry().setFromPoints([new THREE.Vector3(Math.cos(a)*R*0.62,Math.sin(a)*R*0.62,0),new THREE.Vector3(Math.cos(a)*R,Math.sin(a)*R,0)]);
 wheel.add(new THREE.Line(g,new THREE.LineBasicMaterial({color:0x6a5aa6,transparent:true,opacity:.4})));}
HOUSES.forEach(h=>{const a=THREE.MathUtils.degToRad(h);
 const g=new THREE.BufferGeometry().setFromPoints([new THREE.Vector3(0,0,0),new THREE.Vector3(Math.cos(a)*R*0.62,Math.sin(a)*R*0.62,0)]);
 wheel.add(new THREE.Line(g,new THREE.LineBasicMaterial({color:0x352d5c,transparent:true,opacity:.4})));});
const core=new THREE.Sprite(new THREE.SpriteMaterial({map:radialTex('rgba(200,170,230,.5)','rgba(150,120,220,0)'),blending:THREE.AdditiveBlending,depthWrite:false,opacity:.4}));core.scale.set(3,3,1);wheel.add(core);

function posOf(lon){const a=THREE.MathUtils.degToRad(lon);return new THREE.Vector3(Math.cos(a)*R*0.82,Math.sin(a)*R*0.82,0);}

aspects.forEach(as=>{const g=new THREE.BufferGeometry().setFromPoints([posOf(P[as.a].lon),posOf(P[as.b].lon)]);
 wheel.add(new THREE.Line(g,new THREE.LineBasicMaterial({color:as.hard?0xff5a5a:0xe9c877,transparent:true,opacity:as.hard?.82:.6})));});

function signGlyph(ch){ const s=220,cv=document.createElement('canvas');cv.width=cv.height=s;const x=cv.getContext('2d');
 x.font='bold 138px Georgia';x.textAlign='center';x.textBaseline='middle';
 x.lineWidth=12;x.lineJoin='round';x.strokeStyle='rgba(24,12,48,.95)';x.strokeText(ch,s/2,s/2+6);
 x.shadowColor='#a071ff';x.shadowBlur=16;x.fillStyle='#c8adff';x.fillText(ch,s/2,s/2+6);
 x.shadowBlur=0;x.fillStyle='#ded0ff';x.fillText(ch,s/2,s/2+6);
 const sp=new THREE.Sprite(new THREE.SpriteMaterial({map:new THREE.CanvasTexture(cv),transparent:true,depthWrite:false}));sp.scale.set(1.95,1.95,1);sp.renderOrder=3;return sp; }
const nodes=[];
keys.forEach(k=>{const pos=posOf(P[k].lon);const isHot=hot.has(k);
 const ball=new THREE.Mesh(new THREE.SphereGeometry(0.22,22,22),new THREE.MeshBasicMaterial({color:0xb98e3e,transparent:true,opacity:.95}));
 ball.position.copy(pos);wheel.add(ball);
 let halo=null;
 if(isHot){ halo=new THREE.Sprite(new THREE.SpriteMaterial({map:radialTex('rgba(255,95,95,.6)','rgba(255,95,95,0)'),blending:THREE.AdditiveBlending,depthWrite:false,opacity:.5}));
  halo.position.copy(pos);halo.scale.set(1.15,1.15,1);wheel.add(halo); }
 const gl=signGlyph(GLYPH[P[k].sign]);gl.position.copy(pos);wheel.add(gl);
 nodes.push({ball,halo,isHot});});

const composer=new EffectComposer(renderer);
composer.addPass(new RenderPass(scene,camera));
composer.addPass(new UnrealBloomPass(new THREE.Vector2(innerWidth,innerHeight),0.42,0.7,0.62));
composer.addPass(new OutputPass());

document.getElementById('yorumla').addEventListener('click',()=>{const t=document.getElementById('toast');t.classList.add('show');clearTimeout(window.__tt);window.__tt=setTimeout(()=>t.classList.remove('show'),3200);});

addEventListener('resize',()=>{camera.aspect=innerWidth/innerHeight;camera.updateProjectionMatrix();renderer.setSize(innerWidth,innerHeight);composer.setSize(innerWidth,innerHeight);});
document.getElementById('loading').style.display='none';
let t=0;
function loop(){requestAnimationFrame(loop);t+=0.016;controls.update();
 for(const s of tw){const v=0.35+0.65*Math.pow((Math.sin(t*s.userData.sp+s.userData.ph)+1)/2,2);s.material.opacity=v;const sc=s.userData.b*(0.7+0.5*v);s.scale.set(sc,sc,1);}
 const pulse=(Math.sin(t*2.4)+1)/2;
 nodes.forEach(n=>{if(n.isHot&&n.halo){n.halo.material.opacity=.3+pulse*.5;n.halo.scale.setScalar(1.1+pulse*.5);}});
 composer.render();}
loop();
</script>
</body>
</html>
