    font-size:13.5px;letter-spacing:1px;z-index:9;pointer-events:none}
  #toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';
import { OutputPass } from 'three/addons/postprocessing/OutputPass.js';

const GLYPH={Koç:'♈',Boğa:'♉',İkizler:'♊',Yengeç:'♋',Aslan:'♌',Başak:'♍',Terazi:'♎',Akrep:'♏',Yay:'♐',Oğlak:'♑',Kova:'♒',Balık:'♓'};
const P={ Sun:{lon:1.3487,sign:'Koç'}, Moon:{lon:281.782,sign:'Oğlak'}, Mercury:{lon:19.4538,sign:'Koç'}, Venus:{lon:314.999,sign:'Kova'}, Mars:{lon:13.4786,sign:'Koç'}, Jupiter:{lon:340.9262,sign:'Balık'}, Saturn:{lon:20.5548,sign:'Koç'}, Uranus:{lon:311.4814,sign:'Kova'}, Neptune:{lon:301.6574,sign:'Kova'}, Pluto:{lon:248.0293,sign:'Yay'} };
const HOUSES=[6.829,45.656,71.924,93.7799,116.2359,144.6126,186.829,225.656,251.924,273.7799,296.2359,324.6126];
const ASP=[[0,8],[60,5],[90,6],[120,6],[180,8]], HARD=new Set([90,180]);
const keys=Object.keys(P); const aspects=[]; const hot=new Set();
for(let i=0;i<keys.length;i++)for(let j=i+1;j<keys.length;j++){ let sep=Math.abs(P[keys[i]].lon-P[keys[j]].lon)%360; if(sep>180)sep=360-sep;
 for(const[ang,orb]of ASP){ if(Math.abs(sep-ang)<=orb){ const hard=HARD.has(ang); aspects.push({a:keys[i],b:keys[j],hard}); if(hard){hot.add(keys[i]);hot.add(keys[j]);} break; } } }

const canvas=document.getElementById('c');
const renderer=new THREE.WebGLRenderer({canvas,antialias:true});
renderer.setPixelRatio(Math.min(devicePixelRatio,2)); renderer.setSize(innerWidth,innerHeight);
renderer.toneMapping=THREE.ACESFilmicToneMapping; renderer.toneMappingExposure=1.0;
const scene=new THREE.Scene(); scene.background=new THREE.Color(0x070a1e); scene.fog=new THREE.FogExp2(0x070a1e,0.013);
scene.add(new THREE.AmbientLight(0x9aa8d0,0.6)); const sunLight=new THREE.PointLight(0xfff0d0,2,0,0); scene.add(sunLight); const dl=new THREE.DirectionalLight(0xd0d6ff,0.55); dl.position.set(2,3,4); scene.add(dl);
const camera=new THREE.PerspectiveCamera(52,innerWidth/innerHeight,0.1,400); camera.position.set(0,3.5,15.5);
const controls=new OrbitControls(camera,canvas);
controls.enableDamping=true; controls.dampingFactor=.06; controls.autoRotate=true; controls.autoRotateSpeed=.42;
controls.minDistance=7; controls.maxDistance=30; controls.enablePan=false;

function radialTex(inner,outer){ const s=128,cv=document.createElement('canvas');cv.width=cv.height=s;const x=cv.getContext('2d');
 const g=x.createRadialGradient(s/2,s/2,0,s/2,s/2,s/2);g.addColorStop(0,inner);g.addColorStop(1,outer); x.fillStyle=g;x.fillRect(0,0,s,s);return new THREE.CanvasTexture(cv); }
const softTex=radialTex('rgba(255,255,255,1)','rgba(255,255,255,0)');

function starfield(n,rMin,rMax,size,col,op){ const g=new THREE.BufferGeometry();const pos=new Float32Array(n*3);
 for(let i=0;i<n;i++){const r=rMin+Math.random()*(rMax-rMin);const u=Math.random()*2-1;const th=Math.random()*Math.PI*2;const sq=Math.sqrt(1-u*u);
  pos[i*3]=r*sq*Math.cos(th);pos[i*3+1]=r*sq*Math.sin(th);pos[i*3+2]=r*u;}
 g.setAttribute('position',new THREE.BufferAttribute(pos,3));
 return new THREE.Points(g,new THREE.PointsMaterial({size,map:softTex,color:col,transparent:true,depthWrite:false,blending:THREE.AdditiveBlending,opacity:op})); }
scene.add(starfield(3200,30,115,.4,0xffffff,.55));
scene.add(starfield(1500,26,100,.26,0xdfe6ff,.42));
scene.add(starfield(1100,32,115,.42,0xffd489,.42));

const tw=[];
for(let i=0;i<120;i++){const s=new THREE.Sprite(new THREE.SpriteMaterial({map:softTex,color:0xffffff,transparent:true,depthWrite:false,blending:THREE.AdditiveBlending}));
 const r=16+Math.random()*80,u=Math.random()*2-1,th=Math.random()*Math.PI*2,sq=Math.sqrt(1-u*u);
 s.position.set(r*sq*Math.cos(th),r*sq*Math.sin(th),r*u);
 const b=0.25+Math.random()*0.5; s.scale.set(b,b,1); s.userData={ph:Math.random()*6.28,sp:1.5+Math.random()*2.5,b};
 scene.add(s); tw.push(s);}

// karışık takım yıldızları (Destiny Map tarzı, ince çizgili)
function randDir(rad){const u=Math.random()*2-1,th=Math.random()*Math.PI*2,sq=Math.sqrt(1-u*u);return new THREE.Vector3(rad*sq*Math.cos(th),rad*sq*Math.sin(th),rad*u);}
for(let c=0;c<8;c++){ const center=randDir(45+Math.random()*45); const nv=4+Math.floor(Math.random()*4); const verts=[];
 for(let i=0;i<nv;i++){const off=new THREE.Vector3((Math.random()-.5),(Math.random()-.5),(Math.random()-.5)).multiplyScalar(center.length()*0.15);verts.push(center.clone().add(off));}
 for(let i=0;i<nv-1;i++){const g=new THREE.BufferGeometry().setFromPoints([verts[i],verts[i+1]]);scene.add(new THREE.Line(g,new THREE.LineBasicMaterial({color:0xbcc6e8,transparent:true,opacity:.3})));}
 if(nv>=5){const g=new THREE.BufferGeometry().setFromPoints([verts[1],verts[nv-1]]);scene.add(new THREE.Line(g,new THREE.LineBasicMaterial({color:0xbcc6e8,transparent:true,opacity:.2})));}
 verts.forEach(v=>{const st=new THREE.Sprite(new THREE.SpriteMaterial({map:softTex,color:0xffffff,transparent:true,depthWrite:false,blending:THREE.AdditiveBlending,opacity:.95}));st.position.copy(v);const b=0.4+Math.random()*0.45;st.scale.set(b,b,1);scene.add(st);}); }

// altın toz bulutu — kameranın önünden geçen (döndürünce süzülür)
const dustGroup=new THREE.Group(); scene.add(dustGroup); const dust=[];
for(let i=0;i<100;i++){const s=new THREE.Sprite(new THREE.SpriteMaterial({map:softTex,color:0xffd489,transparent:true,depthWrite:false,blending:THREE.AdditiveBlending,opacity:.4}));
 const r=8+Math.random()*15,u=Math.random()*2-1,th=Math.random()*Math.PI*2,sq=Math.sqrt(1-u*u);
 s.position.set(r*sq*Math.cos(th),r*sq*Math.sin(th),r*u);
 const b=0.18+Math.random()*0.55;s.userData={ph:Math.random()*6.28,sp:0.8+Math.random()*1.8,base:b};s.scale.set(b,b,1);
 dustGroup.add(s);dust.push(s);}
const wheel=new THREE.Group(); scene.add(wheel); wheel.rotation.x=-0.5;
const R=6;
[[R,0.028,0xcaa658],[R*0.62,0.014,0x9c7fd6]].forEach(([rr,tb,col])=>{wheel.add(new THREE.Mesh(new THREE.TorusGeometry(rr,tb,16,220),new THREE.MeshBasicMaterial({color:col,transparent:true,opacity:.85})));});
for(let k=0;k<12;k++){const a=THREE.MathUtils.degToRad(k*30);
 const g=new THREE.BufferGeometry().setFromPoints([new THREE.Vector3(Math.cos(a)*R*0.62,Math.sin(a)*R*0.62,0),new THREE.Vector3(Math.cos(a)*R,Math.sin(a)*R,0)]);
 wheel.add(new THREE.Line(g,new THREE.LineBasicMaterial({color:0x6a5aa6,transparent:true,opacity:.4})));}
HOUSES.forEach(h=>{const a=THREE.MathUtils.degToRad(h);
 const g=new THREE.BufferGeometry().setFromPoints([new THREE.Vector3(0,0,0),new THREE.Vector3(Math.cos(a)*R*0.62,Math.sin(a)*R*0.62,0)]);
 wheel.add(new THREE.Line(g,new THREE.LineBasicMaterial({color:0x352d5c,transparent:true,opacity:.4})));});
// armila küresi — sarı ekvatorun tersine dik çemberler (3B kafes)
[['x',0xcaa658,.5],['y',0xbf9fe0,.42]].forEach(([ax,col,op])=>{
 const m=new THREE.Mesh(new THREE.TorusGeometry(R,0.02,16,220),new THREE.MeshBasicMaterial({color:col,transparent:true,opacity:op}));
 if(ax==='x')m.rotation.x=Math.PI/2; else m.rotation.y=Math.PI/2;
 wheel.add(m);
 const m2=new THREE.Mesh(new THREE.TorusGeometry(R*0.62,0.012,12,180),new THREE.MeshBasicMaterial({color:0x9c7fd6,transparent:true,opacity:.30}));
 if(ax==='x')m2.rotation.x=Math.PI/2; else m2.rotation.y=Math.PI/2;
 wheel.add(m2);
});
{const g=new THREE.BufferGeometry().setFromPoints([new THREE.Vector3(0,0,-R),new THREE.Vector3(0,0,R)]);
 wheel.add(new THREE.Line(g,new THREE.LineBasicMaterial({color:0x6a5aa6,transparent:true,opacity:.30})));}
// ---- yüksek kaliteli animasyonlu GÜNEŞ ----
const suns=[];
function randUnit(){const u=Math.random()*2-1,th=Math.random()*Math.PI*2,sq=Math.sqrt(1-u*u);return new THREE.Vector3(sq*Math.cos(th),sq*Math.sin(th),u);}
function fireTex(){const s=256,cv=document.createElement('canvas');cv.width=cv.height=s;const x=cv.getContext('2d');x.fillStyle='#b83c05';x.fillRect(0,0,s,s);const cols=['255,228,130','255,150,40','196,44,10','255,190,70'];for(let i=0;i<190;i++){const rx=Math.random()*s,ry=Math.random()*s,rr=6+Math.random()*38;const col=cols[Math.floor(Math.random()*cols.length)];const g=x.createRadialGradient(rx,ry,0,rx,ry,rr);g.addColorStop(0,'rgba('+col+','+(0.45+Math.random()*0.45)+')');g.addColorStop(1,'rgba('+col+',0)');x.fillStyle=g;x.beginPath();x.arc(rx,ry,rr,0,6.28);x.fill();}const t=new THREE.CanvasTexture(cv);t.wrapS=t.wrapT=THREE.RepeatWrapping;return t;}
function makeSun(radius,nparts){const g=new THREE.Group();
 const c1=new THREE.Mesh(new THREE.SphereGeometry(radius,40,40),new THREE.MeshBasicMaterial({map:fireTex()}));
 const c2=new THREE.Mesh(new THREE.SphereGeometry(radius*1.02,40,40),new THREE.MeshBasicMaterial({map:fireTex(),transparent:true,opacity:.5,blending:THREE.AdditiveBlending}));g.add(c1);g.add(c2);
 const glow=new THREE.Sprite(new THREE.SpriteMaterial({map:radialTex('rgba(255,188,88,.95)','rgba(255,110,25,0)'),blending:THREE.AdditiveBlending,depthWrite:false,opacity:.7}));glow.scale.set(radius*5,radius*5,1);g.add(glow);
 const parts=[];for(let i=0;i<nparts;i++){const sp=new THREE.Sprite(new THREE.SpriteMaterial({map:softTex,color:0xffb84d,transparent:true,depthWrite:false,blending:THREE.AdditiveBlending,opacity:0}));g.add(sp);parts.push({s:sp,life:Math.random(),dir:randUnit()});}
 g.userData={c1,c2,glow,parts,radius,flareT:2+Math.random()*4,flares:[]};suns.push(g);return g;}
function updateSun(g){const d=g.userData;d.c1.rotation.y+=0.006;d.c2.rotation.y-=0.004;d.c2.rotation.x+=0.0025;
 d.glow.material.opacity=.55+0.2*Math.sin(t*1.5+d.radius);
 for(const p of d.parts){p.life+=0.011;if(p.life>1){p.life=0;p.dir=randUnit();}const r=d.radius*(1.0+p.life*1.7);p.s.position.set(p.dir.x*r,p.dir.y*r,p.dir.z*r);const b=d.radius*(0.42+p.life*0.5);p.s.scale.set(b,b,1);p.s.material.opacity=(1-p.life)*0.85;}
 d.flareT-=0.016;if(d.flareT<=0){const dir=randUnit();const fl=new THREE.Sprite(new THREE.SpriteMaterial({map:radialTex('rgba(255,240,190,.95)','rgba(255,120,40,0)'),blending:THREE.AdditiveBlending,depthWrite:false,opacity:.9}));fl.position.set(dir.x*d.radius,dir.y*d.radius,dir.z*d.radius);g.add(fl);d.flares.push({fl,life:0,dir});for(const p of d.parts){if(Math.random()<0.4){p.life=0;p.dir=dir.clone().add(randUnit().multiplyScalar(0.4)).normalize();}}d.flareT=3+Math.random()*4.5;}
 for(let i=d.flares.length-1;i>=0;i--){const f=d.flares[i];f.life+=0.03;const r=d.radius*(1.0+f.life*2.2);f.fl.position.set(f.dir.x*r,f.dir.y*r,f.dir.z*r);const b=d.radius*(1.2+f.life*2.6);f.fl.scale.set(b,b,1);f.fl.material.opacity=Math.max(0,0.9*(1-f.life));if(f.life>=1){g.remove(f.fl);d.flares.splice(i,1);}}}
const centerSun=makeSun(0.5,50);wheel.add(centerSun);
const sunRing=new THREE.Mesh(new THREE.TorusGeometry(0.92,0.012,12,90),new THREE.MeshBasicMaterial({color:0xe8b45c,transparent:true,opacity:.5}));wheel.add(sunRing);
// çember kenarı derece rakamları
function numSprite(txt){const s=128,cv=document.createElement('canvas');cv.width=cv.height=s;const x=cv.getContext('2d');x.font='42px Georgia';x.textAlign='center';x.textBaseline='middle';x.fillStyle='rgba(208,198,236,.72)';x.fillText(txt,s/2,s/2);const sp=new THREE.Sprite(new THREE.SpriteMaterial({map:new THREE.CanvasTexture(cv),transparent:true,depthWrite:false,depthTest:false}));sp.scale.set(0.62,0.62,1);sp.renderOrder=2;return sp;}
for(let d=0;d<360;d+=30){const a=THREE.MathUtils.degToRad(d);const sp=numSprite(String(d)+'°');sp.position.set(Math.cos(a)*R*1.09,Math.sin(a)*R*1.09,0);wheel.add(sp);}

function posOf(lon){const a=THREE.MathUtils.degToRad(lon);return new THREE.Vector3(Math.cos(a)*R*0.82,Math.sin(a)*R*0.82,0);}
// gezegenleri KÜRE yüzeyine dağıt (enlem ile derinlik) — artık tek düzlemde değil
const POS={}, SZ={};
{const LAT={Sun:0,Moon:34,Mercury:-16,Venus:15,Mars:-27,Jupiter:20,Saturn:-35,Uranus:28,Neptune:-15,Pluto:23};
 const ord=[...keys].sort((x,y)=>P[x].lon-P[y].lon);let i=0;
 while(i<ord.length){let j=i;while(j+1<ord.length&&(P[ord[j+1]].lon-P[ord[j]].lon)<9)j++;const n=j-i+1;
  for(let t=0;t<n;t++){const k=ord[i+t];const a=THREE.MathUtils.degToRad(P[k].lon);const rr=R*0.82;
   const latDeg = (n>1) ? (t/(n-1)-0.5)*48 : (LAT[k]||0);
   const la=THREE.MathUtils.degToRad(latDeg);
   POS[k]=new THREE.Vector3(Math.cos(la)*Math.cos(a)*rr, Math.cos(la)*Math.sin(a)*rr, Math.sin(la)*rr);
  }i=j+1;}}

for(let x=0;x<keys.length;x++)for(let y=x+1;y<keys.length;y++){wheel.add(new THREE.Line(new THREE.BufferGeometry().setFromPoints([POS[keys[x]],POS[keys[y]]]),new THREE.LineBasicMaterial({color:0xbda8e6,transparent:true,opacity:.09})));}
aspects.forEach(as=>{const g=new THREE.BufferGeometry().setFromPoints([POS[as.a],POS[as.b]]);
 wheel.add(new THREE.Line(g,new THREE.LineBasicMaterial({color:as.hard?0xff5a5a:0xe9c877,transparent:true,opacity:as.hard?.82:.6})));});

// gerçek gezegen dokuları (canvas ile prosedürel)
function planetTex(p){ const s=256,cv=document.createElement('canvas');cv.width=s;cv.height=s;const x=cv.getContext('2d');
 x.fillStyle=p.c;x.fillRect(0,0,s,s);
 if(p.type==='band'){let y=0;while(y<s){const h=5+Math.random()*22;x.fillStyle=p.bands[Math.floor(Math.random()*p.bands.length)];x.globalAlpha=.45+Math.random()*.45;x.fillRect(0,y,s,h);y+=h;}x.globalAlpha=1;
   if(p.spot){x.beginPath();x.ellipse(s*0.62,s*0.6,26,16,0,0,6.28);x.fillStyle='#b5462c';x.globalAlpha=.7;x.fill();x.globalAlpha=1;}}
 else if(p.type==='smooth'){let y=0;while(y<s){const h=16+Math.random()*30;x.fillStyle=p.bands?p.bands[Math.floor(Math.random()*p.bands.length)]:p.c;x.globalAlpha=.22+Math.random()*.2;x.fillRect(0,y,s,h);y+=h;}x.globalAlpha=1;}
 else {for(let i=0;i<420;i++){const rr=2+Math.random()*9;x.beginPath();x.arc(Math.random()*s,Math.random()*s,rr,0,6.28);x.fillStyle=(Math.random()<.5?'rgba(0,0,0,.2)':'rgba(255,255,255,.12)');x.fill();}
   if(p.c2){for(let i=0;i<50;i++){const rr=7+Math.random()*20;x.globalAlpha=.28;x.beginPath();x.arc(Math.random()*s,Math.random()*s,rr,0,6.28);x.fillStyle=p.c2;x.fill();x.globalAlpha=1;}}}
 return new THREE.CanvasTexture(cv); }
const PL={ Sun:{type:'sun',size:0.3}, Moon:{c:'#b9b9c4',type:'rock',size:0.22}, Mercury:{c:'#9a8b7a',type:'rock',size:0.2}, Venus:{c:'#e6cd92',type:'smooth',size:0.27,bands:['#f0d9a0','#d8b877']}, Mars:{c:'#c1502e',type:'rock',size:0.24,c2:'#8f3a20'}, Jupiter:{c:'#d8b98c',type:'band',size:0.46,spot:true,bands:['#e6d3b0','#c79a6b','#b07d52','#ddc39c','#a86f45']}, Saturn:{c:'#dcc79a',type:'band',size:0.36,ring:true,bands:['#e6d6ac','#cbb082','#ddc79a']}, Uranus:{c:'#a8e0e4',type:'smooth',size:0.31,bands:['#b8e8ea','#9ad3d8']}, Neptune:{c:'#3f66c9',type:'smooth',size:0.31,bands:['#4f72d0','#2f4fa8']}, Pluto:{c:'#a89383',type:'rock',size:0.18} };
const nodes=[];
keys.forEach(k=>{const pos=POS[k];const isHot=hot.has(k);const pl=PL[k];const sz=pl.size*(SZ[k]||1);
 let planet;
 if(pl.type==='sun'){planet=makeSun(sz,26);planet.position.copy(pos);wheel.add(planet);}
 else {planet=new THREE.Mesh(new THREE.SphereGeometry(sz,30,30),new THREE.MeshStandardMaterial({map:planetTex(pl),roughness:1,metalness:0}));planet.position.copy(pos);wheel.add(planet);}
 if(pl.ring){const rg=new THREE.Mesh(new THREE.RingGeometry(sz*1.35,sz*2.15,64),new THREE.MeshBasicMaterial({color:0xdcc79a,side:THREE.DoubleSide,transparent:true,opacity:.6}));rg.position.copy(pos);rg.rotation.set(1.1,0.35,0);wheel.add(rg);}
 if(window.SIGNIMG&&window.SIGNIMG[P[k].sign]){const gs=new THREE.Sprite(new THREE.SpriteMaterial({map:new THREE.TextureLoader().load(window.SIGNIMG[P[k].sign]),transparent:true,depthWrite:false,depthTest:false,opacity:.92}));gs.position.copy(pos);gs.scale.set(sz*1.9,sz*1.9,1);gs.renderOrder=6;wheel.add(gs);}
 let halo=null;
 if(isHot){halo=new THREE.Sprite(new THREE.SpriteMaterial({map:radialTex('rgba(255,110,110,.45)','rgba(255,110,110,0)'),blending:THREE.AdditiveBlending,depthWrite:false,opacity:.4}));halo.position.copy(pos);halo.scale.set(sz*3.6,sz*3.6,1);wheel.add(halo);}
 nodes.push({planet,halo,isHot,isSun:pl.type==='sun'});});

const composer=new EffectComposer(renderer);
composer.addPass(new RenderPass(scene,camera));
composer.addPass(new UnrealBloomPass(new THREE.Vector2(innerWidth,innerHeight),0.34,0.7,0.68));
composer.addPass(new OutputPass());

document.getElementById('yorumla').addEventListener('click',()=>{const t=document.getElementById('toast');t.classList.add('show');clearTimeout(window.__tt);window.__tt=setTimeout(()=>t.classList.remove('show'),3200);});

addEventListener('resize',()=>{camera.aspect=innerWidth/innerHeight;camera.updateProjectionMatrix();renderer.setSize(innerWidth,innerHeight);composer.setSize(innerWidth,innerHeight);});
document.getElementById('loading').style.display='none';
let t=0;
function loop(){requestAnimationFrame(loop);t+=0.016;controls.update();
 for(const s of tw){const v=0.35+0.65*Math.pow((Math.sin(t*s.userData.sp+s.userData.ph)+1)/2,2);s.material.opacity=v;const sc=s.userData.b*(0.7+0.5*v);s.scale.set(sc,sc,1);}
 dustGroup.rotation.y+=0.0007;dustGroup.rotation.x+=0.0003;
 for(const s of dust){const v=(Math.sin(t*s.userData.sp+s.userData.ph)+1)/2;s.material.opacity=0.18+v*0.5;const sc=s.userData.base*(0.75+0.4*v);s.scale.set(sc,sc,1);}
 const pulse=(Math.sin(t*2.4)+1)/2;
 nodes.forEach(n=>{if(!n.isSun)n.planet.rotation.y+=0.005;if(n.isHot&&n.halo){n.halo.material.opacity=.24+pulse*.35;}});
 for(const sg of suns)updateSun(sg);
 composer.render();}
loop();
</script>
</body>
</html>
