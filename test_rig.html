<!doctype html>
<html lang="tr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>Rig Test</title>
<style>*{margin:0;padding:0}html,body{width:100%;height:100%;overflow:hidden;background:#05030f}#c{display:block;width:100%;height:100%}</style>
</head>
<body>
<canvas id="c"></canvas>
<script type="importmap">
{ "imports": {
  "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
  "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
}}
</script>
<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';
import { OutputPass } from 'three/addons/postprocessing/OutputPass.js';

const canvas=document.getElementById('c');
const renderer=new THREE.WebGLRenderer({canvas,antialias:true});
renderer.setPixelRatio(Math.min(devicePixelRatio,2));renderer.setSize(innerWidth,innerHeight);
renderer.toneMapping=THREE.ACESFilmicToneMapping;renderer.toneMappingExposure=1.0;
const scene=new THREE.Scene();scene.background=new THREE.Color(0x05030f);
scene.add(new THREE.AmbientLight(0x9aa8d0,0.6));
const key=new THREE.PointLight(0xffe6b0,0.9,80,1.4);key.position.set(4,7,9);scene.add(key);
const fill=new THREE.PointLight(0x8a9cff,0.5,80,1.4);fill.position.set(-5,3,5);scene.add(fill);
const camera=new THREE.PerspectiveCamera(52,innerWidth/innerHeight,0.1,400);camera.position.set(2.6,6.0,10.5);
const controls=new OrbitControls(camera,canvas);controls.enableDamping=true;controls.dampingFactor=.06;controls.target.set(0.3,4.4,0);
controls.minDistance=3;controls.maxDistance=40;

const being=new THREE.Group();scene.add(being);
const bones={};
window.__bones=bones;window.__being=being;window.__cam=camera;window.__ctl=controls;
window.__pose=(name,rx,ry,rz)=>{const b=bones[name];if(b){if(rx!==undefined)b.rotation.x=rx;if(ry!==undefined)b.rotation.y=ry;if(rz!==undefined)b.rotation.z=rz;}return b?[+b.rotation.x.toFixed(2),+b.rotation.y.toFixed(2),+b.rotation.z.toFixed(2)]:null;};
window.__rest={};

new GLTFLoader().load('being_rigged.glb?v=1',(gltf)=>{
 const m=gltf.scene;
 m.traverse(o=>{
   if(o.isBone){bones[o.name]=o;window.__rest[o.name]=o.rotation.clone();}
   if(o.isMesh&&o.material){const mat=o.material;
     if(mat.map){mat.emissive=new THREE.Color(0xffffff);mat.emissiveMap=mat.map;mat.emissiveIntensity=0.55;}
     mat.side=THREE.DoubleSide;mat.needsUpdate=true;
     o.frustumCulled=false;
   }
 });
 const box=new THREE.Box3().setFromObject(m);const size=new THREE.Vector3();box.getSize(size);const ctr=new THREE.Vector3();box.getCenter(ctr);
 const targetH=6.4;const sc=targetH/(size.y||1);m.scale.setScalar(sc);
 m.position.set(-ctr.x*sc,-box.min.y*sc,-ctr.z*sc);
 m.rotation.y=Math.PI;being.add(m);window.__model=m;
 window.__info={size:[+size.x.toFixed(3),+size.y.toFixed(3),+size.z.toFixed(3)],bones:Object.keys(bones)};
 console.log('RIG_LOADED',JSON.stringify(window.__info));
},undefined,(e)=>{console.log('ERR',e);window.__info={err:String(e)};});

const composer=new EffectComposer(renderer);
composer.addPass(new RenderPass(scene,camera));
composer.addPass(new UnrealBloomPass(new THREE.Vector2(innerWidth,innerHeight),0.34,0.7,0.68));
composer.addPass(new OutputPass());
addEventListener('resize',()=>{camera.aspect=innerWidth/innerHeight;camera.updateProjectionMatrix();renderer.setSize(innerWidth,innerHeight);composer.setSize(innerWidth,innerHeight);});
function loop(){requestAnimationFrame(loop);controls.update();composer.render();}
loop();
</script>
</body>
</html>
